name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:

  # ── Server-Docker-Image → ghcr.io ─────────────────────────────────────────
  docker:
    name: Docker → ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadaten & Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/server
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Client-Binary: Linux ───────────────────────────────────────────────────
  client-linux:
    name: Client · Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: client/requirements.txt

      - name: Abhängigkeiten installieren
        working-directory: client
        run: pip install -r requirements.txt pyinstaller

      - name: Binary bauen
        working-directory: client
        run: |
          pyinstaller \
            --onefile \
            --collect-all pygame \
            --name tank-game \
            main.py

      - uses: actions/upload-artifact@v4
        with:
          name: client-linux
          path: client/dist/tank-game

  # ── Client-Binary: Windows ─────────────────────────────────────────────────
  client-windows:
    name: Client · Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: client/requirements.txt

      - name: Abhängigkeiten installieren
        working-directory: client
        run: pip install -r requirements.txt pyinstaller

      - name: Binary bauen
        working-directory: client
        run: |
          pyinstaller `
            --onefile `
            --collect-all pygame `
            --noconsole `
            --name tank-game `
            main.py

      - uses: actions/upload-artifact@v4
        with:
          name: client-windows
          path: client/dist/tank-game.exe

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [docker, client-linux, client-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: client-linux
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: client-windows
          path: dist/

      - name: Binaries vorbereiten
        run: |
          mv dist/tank-game dist/tank-game-linux
          chmod +x dist/tank-game-linux

      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/tank-game-linux
            dist/tank-game-windows.exe
          body: |
            ## Tank Game ${{ github.ref_name }}

            ### Server (Docker)

            ```bash
            docker pull ghcr.io/${{ github.repository }}/server:${{ github.ref_name }}
            ```

            `docker-compose.yml` für den Server:
            ```yaml
            services:
              server:
                image: ghcr.io/${{ github.repository }}/server:${{ github.ref_name }}
                ports:
                  - "3001:3001"
                restart: unless-stopped
            ```

            ### Client

            | Plattform | Datei |
            |-----------|-------|
            | Linux     | `tank-game-linux` |
            | Windows   | `tank-game-windows.exe` |

            ```bash
            # Verbindet standardmäßig mit ws://localhost:3001/ws
            ./tank-game-linux

            # Anderen Server angeben:
            ./tank-game-linux ws://mein-server:3001/ws
            ```

            > Bot-Clients verbinden mit `?type=bot` – der Server sendet dann
            > zusätzlich strukturierte ML-Observations.
